<text x="960" y="240" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="400" fill="#6B7280" text-anchor="middle">The gap is not detection.</text>
<text x="960" y="322" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="700" fill="#111827" text-anchor="middle">It is what happens next.</text>
<rect x="888" y="350" width="144" height="6" fill="#124BCE" rx="3"/>
<rect x="180" y="378" width="1560" height="220" fill="#EAF3FF" rx="16"/>
<text x="960" y="436" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="600" fill="#111827" text-anchor="middle">How might we help breast cancer screening</text>
<text x="960" y="480" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="600" fill="#111827" text-anchor="middle">radiologists detect, resolve and learn from AI-human</text>
<text x="960" y="524" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="600" fill="#111827" text-anchor="middle">disagreements — in a way that is</text>
<text x="960" y="568" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#124BCE" text-anchor="middle">accountable, transparent and consistent?</text>
