<text x="120" y="348" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="1">With AI</text>
<rect x="180" y="366" width="188" height="72" fill="#F8FAFC" rx="8" stroke="#E5E7EB" stroke-width="1"/>
