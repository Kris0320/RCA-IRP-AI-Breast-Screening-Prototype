<polygon points="870,260 858,254 858,266" fill="#E5E7EB"/>
<rect x="870" y="228" width="240" height="64" fill="#F8FAFC" rx="8" stroke="#E5E7EB" stroke-width="1.5"/>
<text x="990" y="265" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#1F2937" text-anchor="middle">Comparison / review</text>
<line x1="1110" y1="260" x2="1205" y2="260" stroke="#E5E7EB" stroke-width="2"/>
<polygon points="1215,260 1203,254 1203,266" fill="#E5E7EB"/>
<rect x="1215" y="228" width="240" height="64" fill="#F8FAFC" rx="8" stroke="#E5E7EB" stroke-width="1.5"/>
<text x="1335" y="265" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#1F2937" text-anchor="middle">Recall or no recall</text>
