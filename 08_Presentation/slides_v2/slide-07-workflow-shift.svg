<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<!-- 07 Workflow Shift -->
<rect width="1920" height="1080" fill="#FFFFFF"/>
<rect x="0" y="0" width="1920" height="9" fill="#124BCE"/>
<text x="120" y="96" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="700" fill="#111827" text-anchor="start">AI Doesn't Just Assist.</text>
<text x="120" y="148" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#6B7280" text-anchor="start">It creates a new decision point the system wasn't designed to handle.</text>
<text x="120" y="210" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#6B7280" text-anchor="start" letter-spacing="1">Traditional</text>
<rect x="180" y="228" width="240" height="64" fill="#F8FAFC" rx="8" stroke="#E5E7EB" stroke-width="1.5"/>
<text x="300" y="265" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#1F2937" text-anchor="middle">Mammogram acquired</text>
<line x1="420" y1="260" x2="515" y2="260" stroke="#E5E7EB" stroke-width="2"/>
<polygon points="525,260 513,254 513,266" fill="#E5E7EB"/>
