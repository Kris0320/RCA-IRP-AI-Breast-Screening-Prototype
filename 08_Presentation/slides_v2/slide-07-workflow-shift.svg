<text x="512" y="416" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#1F2937" text-anchor="middle">judgement</text>
<line x1="606" y1="402" x2="646" y2="402" stroke="#9CA3AF" stroke-width="2"/>
<polygon points="656,402 644,396 644,408" fill="#9CA3AF"/>
