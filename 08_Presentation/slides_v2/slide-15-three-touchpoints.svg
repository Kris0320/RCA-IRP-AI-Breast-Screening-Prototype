<text x="1286" y="304" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">Learning &</text>
<text x="1286" y="346" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">Governance Loop</text>
<text x="1286" y="412" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">Selected cases become</text>
<text x="1286" y="440" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">calibration material after</text>
<text x="1286" y="468" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">outcome is known.</text>
<circle cx="1284" cy="516" r="7" fill="#16A34A"/>
<text x="1308" y="524" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Cases enter library after follow-up outcome</text>
