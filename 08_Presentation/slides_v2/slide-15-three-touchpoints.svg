<text x="148" y="304" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">Reading</text>
<text x="148" y="346" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">Calibration</text>
<text x="148" y="412" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">The moment AI output is revealed</text>
<text x="148" y="440" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">alongside human judgement.</text>
<circle cx="146" cy="488" r="7" fill="#124BCE"/>
