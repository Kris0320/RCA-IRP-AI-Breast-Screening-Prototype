<text x="120" y="136" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#6B7280" text-anchor="start">Readyology sits across three moments in the reading and governance workflow.</text>
