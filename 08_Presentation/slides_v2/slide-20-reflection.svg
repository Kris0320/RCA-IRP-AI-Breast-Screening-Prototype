<text x="739" y="536" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">decisions evidence-anchored</text>
<circle cx="715" cy="602" r="7" fill="#F59E0B"/>
