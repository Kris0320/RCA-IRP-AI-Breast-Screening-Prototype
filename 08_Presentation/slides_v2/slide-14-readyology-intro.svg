<text x="470" y="370" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" text-anchor="middle"><tspan font-style="italic" fill="#124BCE">R</tspan><tspan>ead</tspan><tspan fill="#124BCE">y</tspan><tspan>ology</tspan></text>
<text x="470" y="430" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#E5E7EB" text-anchor="middle">A lightweight service layer that sits</text>
<text x="470" y="468" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#E5E7EB" text-anchor="middle">inside your existing reading workflow.</text>
<circle cx="310" cy="532" r="8" fill="#124BCE"/>
<text x="334" y="540" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="start">Accountable</text>
<circle cx="310" cy="588" r="8" fill="#124BCE"/>
<text x="334" y="596" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="start">Transparent</text>
<circle cx="310" cy="644" r="8" fill="#124BCE"/>
<text x="334" y="652" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="start">Consistent</text>
<text x="470" y="740" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="middle">For: Breast Advanced Practitioners · Senior Radiologists · NHS Service Leads</text>
<text x="1020" y="160" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">Making AI-human disagreement</text>
<text x="1020" y="206" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#111827" text-anchor="start">visible, manageable and learnable.</text>
<line x1="1020" y1="232" x2="1880" y2="232" stroke="#E5E7EB" stroke-width="1.5"/>
<rect x="1020" y="258" width="860" height="168" fill="#EAF3FF" rx="12"/>
<rect x="1020" y="258" width="6" height="168" fill="#124BCE" rx="3"/>
<text x="1050" y="314" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#124BCE" text-anchor="start">Visibility</text>
<text x="1050" y="354" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Soft cue when AI and human judgement diverge. No</text>
<text x="1050" y="382" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">alarm. No interruption to reading flow.</text>
<rect x="1020" y="446" width="860" height="168" fill="#FFFBEB" rx="12"/>
<rect x="1020" y="446" width="6" height="168" fill="#F59E0B" rx="3"/>
<text x="1050" y="502" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#F59E0B" text-anchor="start">Traceability</text>
<text x="1050" y="542" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Every override, comparison and decision is recorded</text>
<text x="1050" y="570" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">automatically in a non-blame audit trail.</text>
<rect x="1020" y="634" width="860" height="168" fill="#F0FDF4" rx="12"/>
<rect x="1020" y="634" width="6" height="168" fill="#16A34A" rx="3"/>
<text x="1050" y="690" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#16A34A" text-anchor="start">Learnability</text>
<text x="1050" y="730" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Difficult cases become calibration material after</text>
<text x="1050" y="758" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">follow-up outcome is confirmed.</text>
