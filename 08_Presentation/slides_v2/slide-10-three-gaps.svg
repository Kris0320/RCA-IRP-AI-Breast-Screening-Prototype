<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<!-- 10 Three Gaps -->
<rect width="1920" height="1080" fill="#FFFFFF"/>
<rect x="0" y="0" width="1920" height="9" fill="#124BCE"/>
<text x="120" y="96" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="700" fill="#111827" text-anchor="start">Three Types of Gap.</text>
<text x="120" y="152" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="400" fill="#6B7280" text-anchor="start">Three types of consequence.</text>
<rect x="120" y="182" width="541" height="688" fill="#EAF3FF" rx="14"/>
<rect x="120" y="182" width="541" height="12" fill="#124BCE" rx="7"/>
<rect x="120" y="188" width="541" height="6" fill="#124BCE" rx="10"/>
<text x="148" y="250" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#124BCE" text-anchor="start">System Gap</text>
<line x1="148" y1="266" x2="633" y2="266" stroke="#124BCE" stroke-width="1.5"/>
<text x="148" y="298" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">No structured resolution</text>
<text x="148" y="326" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">mechanism when AI and human</text>
<text x="148" y="354" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">disagree.</text>
<circle cx="146" cy="398" r="7" fill="#124BCE"/>
<text x="170" y="406" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">No escalation protocol — arbitration is ad hoc</text>
<circle cx="146" cy="450" r="7" fill="#124BCE"/>
<text x="170" y="458" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">AI signal may be dismissed without evidence</text>
<circle cx="146" cy="502" r="7" fill="#124BCE"/>
<text x="170" y="510" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Resolution is inconsistent across readers</text>
<rect x="120" y="798" width="541" height="72" fill="#124BCE" rx="0"/>
<rect x="120" y="854" width="541" height="16" fill="#124BCE" rx="7"/>
<rect x="120" y="798" width="541" height="56" fill="#124BCE" rx="10"/>
<text x="390" y="841" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Misattributed liability</text>
<rect x="689" y="182" width="541" height="688" fill="#FFFBEB" rx="14"/>
<rect x="689" y="182" width="541" height="12" fill="#F59E0B" rx="7"/>
<rect x="689" y="188" width="541" height="6" fill="#F59E0B" rx="10"/>
<text x="717" y="250" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#F59E0B" text-anchor="start">Human Gap</text>
<line x1="717" y1="266" x2="1202" y2="266" stroke="#F59E0B" stroke-width="1.5"/>
<text x="717" y="298" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">No consistent arbitration</text>
<text x="717" y="326" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">protocol. Override reasoning</text>
<text x="717" y="354" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">is not recorded.</text>
<circle cx="715" cy="398" r="7" fill="#F59E0B"/>
<text x="739" y="406" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Senior review is requested verbally, not formally</text>
<circle cx="715" cy="450" r="7" fill="#F59E0B"/>
<text x="739" y="458" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Decisions cannot be audited or compared</text>
<circle cx="715" cy="502" r="7" fill="#F59E0B"/>
<text x="739" y="510" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Learning from difficult cases is lost</text>
<rect x="689" y="798" width="541" height="72" fill="#F59E0B" rx="0"/>
<rect x="689" y="854" width="541" height="16" fill="#F59E0B" rx="7"/>
<rect x="689" y="798" width="541" height="56" fill="#F59E0B" rx="10"/>
<text x="959" y="841" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Inconsistent clinical decisions</text>
<rect x="1258" y="182" width="541" height="688" fill="#F0FDF4" rx="14"/>
<rect x="1258" y="182" width="541" height="12" fill="#16A34A" rx="7"/>
<rect x="1258" y="188" width="541" height="6" fill="#16A34A" rx="10"/>
<text x="1286" y="250" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#16A34A" text-anchor="start">Data Gap</text>
<line x1="1286" y1="266" x2="1771" y2="266" stroke="#16A34A" stroke-width="1.5"/>
<text x="1286" y="298" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Disagreement cases are not</text>
<text x="1286" y="326" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">captured for AI improvement or</text>
<text x="1286" y="354" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">audit.</text>
<circle cx="1284" cy="398" r="7" fill="#16A34A"/>
<text x="1308" y="406" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">AI cannot learn from its own clinical failure cases</text>
<circle cx="1284" cy="450" r="7" fill="#16A34A"/>
<text x="1308" y="458" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Calibration drift goes undetected over time</text>
<circle cx="1284" cy="502" r="7" fill="#16A34A"/>
<text x="1308" y="510" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#374151" text-anchor="start">Model performance degrades silently</text>
<rect x="1258" y="798" width="541" height="72" fill="#16A34A" rx="0"/>
<rect x="1258" y="854" width="541" height="16" fill="#16A34A" rx="7"/>
<rect x="1258" y="798" width="541" height="56" fill="#16A34A" rx="10"/>
<text x="1528" y="841" font-family="Montserrat,Inter,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Degraded future AI performance</text>
</svg>