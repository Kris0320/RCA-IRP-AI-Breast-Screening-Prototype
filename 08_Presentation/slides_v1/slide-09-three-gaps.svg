<text x="80" y="100" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#111827" text-anchor="start">Three Types of Gap.</text>
<text x="80" y="148" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="400" fill="#6B7280" text-anchor="start">Three types of consequence.</text>
<rect x="80" y="186" width="354" height="420" fill="#EFF6FF" rx="12"/>
