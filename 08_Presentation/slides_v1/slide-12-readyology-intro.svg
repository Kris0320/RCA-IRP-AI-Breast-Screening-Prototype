<text x="682" y="422" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="normal" fill="#111827" text-anchor="start">Every override, comparison and decision is</text>
