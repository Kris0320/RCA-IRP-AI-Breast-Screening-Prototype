<text x="682" y="286" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="normal" fill="#111827" text-anchor="start">Soft cue when AI and human judgement diverge.</text>
<text x="682" y="310" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="normal" fill="#111827" text-anchor="start">No alarm. No interruption.</text>
