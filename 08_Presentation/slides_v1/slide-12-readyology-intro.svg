<text x="130" y="290.0" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" text-anchor="start">A lightweight service layer that sits</text>
<text x="130" y="318.8" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" text-anchor="start">inside your existing reading workflow.</text>
<circle cx="180" cy="390" r="6" fill="#2563EB"/>
<text x="198" y="400" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="start">Accountable</text>
<circle cx="180" cy="442" r="6" fill="#2563EB"/>
<text x="198" y="452" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="start">Transparent</text>
<circle cx="180" cy="494" r="6" fill="#2563EB"/>
<text x="198" y="504" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="start">Consistent</text>
<text x="180" y="580" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" fill="#6B7280" text-anchor="start">For:</text>
<text x="205" y="604" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="normal" fill="#6B7280" text-anchor="start">Breast Advanced Practitioners · Senior Radiologists · NHS Service Leads</text>
<text x="660" y="130" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="start">Making AI-human disagreement</text>
<text x="660" y="166" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="start">visible, manageable and learnable.</text>
<line x1="660" y1="192" x2="1200" y2="192" stroke="#E5E7EB" stroke-width="1.5"/>
