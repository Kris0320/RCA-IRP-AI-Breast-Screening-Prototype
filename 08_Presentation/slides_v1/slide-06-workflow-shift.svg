<text x="1033" y="442" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">decision</text>
<path d="M 1033 474 Q 640 516 157 474" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
<text x="640" y="532" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="normal" fill="#2563EB" text-anchor="middle">Audit & learning loop</text>
<rect x="80" y="528" width="1120" height="2" fill="#E5E7EB"/>
<text x="640" y="566" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="600" fill="#111827" text-anchor="middle">The gap is not in detection. It is in what happens when AI and human judgement diverge.</text>
<text x="640" y="594" font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="normal" fill="#6B7280" text-anchor="middle">No structured review. No consistent record. No learning loop.</text>
