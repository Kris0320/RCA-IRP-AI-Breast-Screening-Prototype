<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .app { fill: #ffffff; stroke: #d9e0e8; stroke-width: 1.4; rx: 18; }
      .sidebar { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1.2; rx: 18; }
      .nav { fill: transparent; }
      .nav-active { fill: #ffffff; stroke: #c9d6e2; stroke-width: 1.1; rx: 12; }
      .panel { fill: #ffffff; stroke: #d9e0e8; stroke-width: 1.3; rx: 16; }
      .panel-blue { fill: #f8fafc; stroke: #d9e0e8; stroke-width: 1.2; rx: 14; }
      .panel-accent { fill: #fff4ee; stroke: #e7b69d; stroke-width: 1.2; rx: 14; }
      .card { fill: #ffffff; stroke: #d4dde7; stroke-width: 1.25; rx: 14; }
      .card-selected { fill: #fffaf7; stroke: #e7b69d; stroke-width: 1.5; rx: 14; }
      .input { fill: #ffffff; stroke: #c9d6e2; stroke-width: 1.15; rx: 12; }
      .filter { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1.1; rx: 12; }
      .button { fill: #315f86; stroke: #315f86; stroke-width: 1.1; rx: 11; }
      .button-light { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1.1; rx: 11; }
      .button-outline { fill: #ffffff; stroke: #c9d6e2; stroke-width: 1.1; rx: 11; }
      .tag { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1; rx: 14; }
      .tag-accent { fill: #fff4ee; stroke: #e7b69d; stroke-width: 1; rx: 14; }
      .title { font-family: "Newsreader", "Times New Roman", serif; font-size: 46px; font-weight: 600; fill: #172033; }
      .subtitle { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 19px; fill: #536174; }
      .kicker { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 13px; fill: #5d6d7e; font-weight: 700; letter-spacing: 0.06em; }
      .nav-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #2d3948; font-weight: 600; }
      .nav-text-active { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #172033; font-weight: 700; }
      .metric { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #172033; font-weight: 700; }
      .metric-label { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 12px; fill: #5d6d7e; font-weight: 700; letter-spacing: 0.04em; }
      .label { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 12px; fill: #5d6d7e; font-weight: 700; letter-spacing: 0.04em; }
      .body { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 13px; fill: #2d3948; }
      .body-strong { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 14px; fill: #172033; font-weight: 700; }
      .card-title { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 18px; fill: #172033; font-weight: 700; }
      .small { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 12px; fill: #536174; }
      .small-strong { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 12px; fill: #172033; font-weight: 700; }
      .tag-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 11px; fill: #273244; font-weight: 700; }
      .tag-text-orange { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 11px; fill: #b34c29; font-weight: 700; }
      .orange { fill: #d9653b; }
      .button-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 13px; fill: #ffffff; font-weight: 700; }
      .button-text-dark { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 13px; fill: #273244; font-weight: 700; }
      .button-text-tight { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 11px; fill: #ffffff; font-weight: 700; }
      .button-text-dark-tight { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 11px; fill: #273244; font-weight: 700; }
      .footer { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 14px; fill: #536174; }
      .divider { stroke: #d9e0e8; stroke-width: 1.1; }
