<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font-family: "Newsreader", "Times New Roman", serif; font-size: 52px; font-weight: 600; fill: #172033; }
      .subtitle { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 24px; fill: #536174; }
      .section { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 22px; fill: #273244; font-weight: 700; }
      .label { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 19px; fill: #273244; font-weight: 700; }
      .small { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 15px; fill: #536174; }
      .chip-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 18px; fill: #273244; font-weight: 600; }
      .note { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 18px; fill: #3f4d5f; }
      .footer { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 14px; fill: #5f6d7d; }
      .node { fill: #ffffff; stroke: #b8c3cf; stroke-width: 1.6; rx: 12; }
      .node-soft { fill: #eef4fa; stroke: #b8c3cf; stroke-width: 1.6; rx: 12; }
      .node-accent { fill: #fff4ee; stroke: #d9653b; stroke-width: 1.9; rx: 12; }
      .group { fill: #ffffff; stroke: #d9e0e8; stroke-width: 1.5; rx: 14; }
      .chip { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1.2; rx: 10; }
      .chip-accent { fill: #fff4ee; stroke: #e7b69d; stroke-width: 1.2; rx: 10; }
      .line { stroke: #9aaabd; stroke-width: 2.4; fill: none; }
      .line-accent { stroke: #d9653b; stroke-width: 2.6; fill: none; }
      .dash { stroke: #9aaabd; stroke-width: 1.7; stroke-dasharray: 6 8; fill: none; }
      .orange { fill: #d9653b; font-weight: 700; }
      .path-label { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #536174; font-weight: 700; }
      .path-label-accent { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #d9653b; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aaabd"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9653b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="title" x="96" y="94">Specific Anchor Workflow / Human–AI Disagreement System Map</text>
  <text class="subtitle" x="98" y="134">Mapping the selected AI-as-second-reader model from assessment to arbitration, decision and learning</text>

  <text class="section" x="96" y="202">Selected anchor workflow: AI as second reader + human-led arbitration</text>

  <!-- Main flow -->
  <g transform="translate(96 246)">
    <rect class="node" x="0" y="0" width="230" height="86"/>
    <text class="label" x="115" y="38" text-anchor="middle">Mammogram</text>
    <text class="label" x="115" y="62" text-anchor="middle">acquired</text>

    <path class="line" marker-end="url(#arrow)" d="M230 43 H282"/>

    <rect class="node" x="282" y="0" width="270" height="86"/>
    <text class="label" x="417" y="38" text-anchor="middle">Case routed into</text>
    <text class="label" x="417" y="62" text-anchor="middle">review workflow</text>

    <path class="line" marker-end="url(#arrow)" d="M552 43 H616"/>

    <rect class="group" x="616" y="-34" width="356" height="154"/>
    <text class="small" x="794" y="-9" text-anchor="middle">Parallel judgement sources</text>

    <rect class="node-soft" x="642" y="14" width="304" height="48"/>
    <text class="label" x="794" y="45" text-anchor="middle">Human judgement recorded</text>

    <rect class="node-soft" x="642" y="72" width="304" height="48"/>
    <text class="label" x="794" y="103" text-anchor="middle">AI output generated</text>

    <path class="line" marker-end="url(#arrow)" d="M972 43 H1036"/>

    <rect class="node-soft" x="1036" y="0" width="250" height="86"/>
      <text class="label" x="1161" y="38" text-anchor="middle">Human–AI</text>
    <text class="label" x="1161" y="62" text-anchor="middle">comparison</text>
  </g>

  <!-- Branches -->
  <g transform="translate(1351 289)">
    <path class="line" d="M0 0 H64"/>
    <path class="line" marker-end="url(#arrow)" d="M64 0 V-90 H234"/>
    <text class="path-label" x="96" y="-64">Agreement</text>

    <rect class="node" x="234" y="-133" width="270" height="86"/>
    <text class="label" x="369" y="-96" text-anchor="middle">Final recall</text>
    <text class="label" x="369" y="-72" text-anchor="middle">decision</text>

    <path class="line-accent" marker-end="url(#arrowAccent)" d="M64 0 V98 H234"/>
    <text class="path-label-accent" x="96" y="74">Disagreement</text>

    <rect class="node-accent" x="234" y="55" width="270" height="86"/>
    <text class="label" x="369" y="92" text-anchor="middle">Disagreement</text>
    <text class="label" x="369" y="116" text-anchor="middle">detected</text>

    <path class="line-accent" marker-end="url(#arrowAccent)" d="M369 141 V194"/>

    <rect class="node-accent" x="234" y="194" width="270" height="86"/>
    <text class="label" x="369" y="231" text-anchor="middle">Arbitration /</text>
    <text class="label" x="369" y="255" text-anchor="middle">senior review</text>

    <path class="line-accent" marker-end="url(#arrowAccent)" d="M504 237 H556 V-90 H504"/>
  </g>

  <!-- Audit and learning loop -->
  <g transform="translate(1508 724)">
    <rect class="node-soft" x="0" y="0" width="344" height="86"/>
    <text class="label" x="172" y="37" text-anchor="middle">Audit &amp;</text>
    <text class="label" x="172" y="61" text-anchor="middle">learning loop</text>
  </g>

  <!-- Final decision and arbitration records feed audit -->
  <path class="line" marker-end="url(#arrow)" d="M1855 199 H1890 V750 H1852"/>
  <path class="line-accent" marker-end="url(#arrowAccent)" d="M1855 526 H1870 V790 H1852"/>

  <!-- Evidence pack -->
  <g transform="translate(96 642)">
    <rect class="group" x="0" y="0" width="1324" height="180"/>
    <text class="section" x="28" y="44">Disagreement evidence pack</text>
    <text class="small" x="28" y="70">A compact record of what was compared, why escalation happened, and what was decided</text>

    <g transform="translate(28 104)">
      <rect class="chip" x="0" y="0" width="214" height="52"/>
      <text class="chip-text" x="107" y="33" text-anchor="middle">Human judgement</text>

      <rect class="chip" x="238" y="0" width="250" height="52"/>
      <text class="chip-text" x="363" y="33" text-anchor="middle">AI output / risk score</text>

      <rect class="chip" x="512" y="0" width="220" height="52"/>
      <text class="chip-text" x="622" y="33" text-anchor="middle">Comparison result</text>

      <rect class="chip-accent" x="756" y="0" width="242" height="52"/>
      <text class="chip-text orange" x="877" y="33" text-anchor="middle">Arbitration rationale</text>

      <rect class="chip" x="1022" y="0" width="242" height="52"/>
      <text class="chip-text" x="1143" y="33" text-anchor="middle">Final recall decision</text>
    </g>
  </g>

  <!-- Boundary note -->
  <g transform="translate(96 872)">
    <rect x="0" y="0" width="1324" height="78" rx="8" fill="#fff4ee" stroke="#e7b69d" stroke-width="1.4"/>
    <text class="note" x="28" y="48">
      <tspan class="orange">Boundary note:</tspan>
      <tspan> AI is treated as an output / evidence layer, not the final decision-maker.</tspan>
    </text>
  </g>

  <!-- Footer note -->
  <g transform="translate(96 996)">
    <line class="dash" x1="0" y1="0" x2="1728" y2="0"/>
    <text class="footer" x="0" y="34">This is a specific anchor workflow segment for the selected AI-as-second-reader model, not a universal NHS workflow.</text>
  </g>
</svg>
