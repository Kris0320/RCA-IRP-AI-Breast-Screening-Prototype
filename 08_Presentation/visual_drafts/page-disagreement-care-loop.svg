<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font-family: "Newsreader", "Times New Roman", serif; font-size: 56px; font-weight: 600; fill: #172033; }
      .subtitle { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 23px; fill: #536174; }
      .kicker { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 15px; fill: #5d6d7e; font-weight: 700; letter-spacing: 0.06em; }
      .step-title { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 21px; fill: #172033; font-weight: 700; }
      .step-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 15px; fill: #536174; }
      .label { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 13px; fill: #5d6d7e; font-weight: 700; letter-spacing: 0.04em; }
      .marker-title { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 15px; fill: #b34c29; font-weight: 700; }
      .marker-text { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #172033; font-weight: 700; }
      .statement { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 24px; fill: #172033; font-weight: 700; }
      .side-note { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 16px; fill: #536174; }
      .num { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 17px; fill: #273244; font-weight: 700; }
      .num-white { font-family: "IBM Plex Sans", Arial, sans-serif; font-size: 17px; fill: #ffffff; font-weight: 700; }
      .panel { fill: #ffffff; stroke: #d9e0e8; stroke-width: 1.5; rx: 18; }
      .step { fill: #ffffff; stroke: #d4dde7; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .step-blue { fill: #eef4fa; stroke: #c9d6e2; stroke-width: 1.4; rx: 16; filter: url(#shadow); }
      .step-orange { fill: #fff4ee; stroke: #e7b69d; stroke-width: 1.4; rx: 16; filter: url(#shadow); }
      .circle { fill: #dbe8f4; stroke: #8ea5bb; stroke-width: 1.2; }
      .circle-orange { fill: #d9653b; stroke: #ffffff; stroke-width: 3; }
      .marker { fill: #fff4ee; stroke: #e7b69d; stroke-width: 1.2; rx: 18; }
      .line { stroke: #9aaabd; stroke-width: 2.4; fill: none; }
      .line-orange { stroke: #d9653b; stroke-width: 2.5; fill: none; }
      .dash-orange { stroke: #d9653b; stroke-width: 2.4; stroke-dasharray: 8 9; fill: none; }
      .soft-ring { fill: none; stroke: #d9e0e8; stroke-width: 18; opacity: 0.78; }
      .dot { fill: #d9653b; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aaabd"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9653b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="kicker" x="96" y="68">SERVICE SYSTEM</text>
  <text class="title" x="96" y="130">Disagreement Care Loop</text>
  <text class="subtitle" x="98" y="172">From AI-human disagreement to human-led review, non-blame record and shared calibration</text>

  <!-- Loop base -->
  <g transform="translate(120 190)">
    <path class="soft-ring" d="M338 356 C370 142 562 62 840 62 C1120 62 1312 142 1344 356 C1376 568 1178 676 840 676 C502 676 306 568 338 356"/>

    <!-- process arrows -->
    <path class="line" marker-end="url(#arrow)" d="M344 262 C416 118 582 86 738 96"/>
    <path class="line" marker-end="url(#arrow)" d="M930 96 C1096 82 1266 118 1338 264"/>
    <path class="line-orange" marker-end="url(#arrowOrange)" d="M1398 386 C1380 526 1244 610 1075 634"/>
    <path class="line" marker-end="url(#arrow)" d="M894 668 C704 692 516 654 406 548"/>
    <path class="line" marker-end="url(#arrow)" d="M318 466 C282 392 290 326 344 262"/>
    <path class="dash-orange" marker-end="url(#arrowOrange)" d="M1120 688 C830 800 456 752 292 524 C214 416 230 294 336 220"/>

    <!-- Step 1 -->
    <g transform="translate(110 284)">
      <rect class="step" x="0" y="0" width="300" height="142"/>
      <circle class="circle" cx="34" cy="34" r="20"/>
      <text class="num" x="34" y="41" text-anchor="middle">1</text>
      <text class="step-title" x="66" y="32">Human judgement</text>
      <text class="step-title" x="66" y="59">recorded</text>
      <text class="step-text" x="24" y="96">Independent human judgement is</text>
      <text class="step-text" x="24" y="119">captured before comparison.</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(528 46)">
      <rect class="step-blue" x="0" y="0" width="300" height="142"/>
      <circle class="circle" cx="34" cy="34" r="20"/>
      <text class="num" x="34" y="41" text-anchor="middle">2</text>
      <text class="step-title" x="66" y="32">AI evidence layer</text>
      <text class="step-title" x="66" y="59">appears</text>
      <text class="step-text" x="24" y="96">AI raises a recall concern or</text>
      <text class="step-text" x="24" y="119">suspicious region.</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(954 46)">
      <rect class="step-orange" x="0" y="0" width="300" height="142"/>
      <circle class="circle-orange" cx="34" cy="34" r="20"/>
      <text class="num-white" x="34" y="41" text-anchor="middle">3</text>
      <text class="step-title" x="66" y="32">Disagreement</text>
      <text class="step-title" x="66" y="59">Detection Cue</text>
      <text class="step-text" x="24" y="96">Second interpretation differs.</text>
      <text class="step-text" x="24" y="119">Comparison review available.</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(1264 284)">
      <rect class="step-orange" x="0" y="0" width="330" height="164"/>
      <circle class="circle-orange" cx="34" cy="34" r="20"/>
      <text class="num-white" x="34" y="41" text-anchor="middle">4</text>
      <text class="step-title" x="66" y="32">Warm Handover +</text>
      <text class="step-title" x="66" y="59">Support Layer</text>
      <text class="step-text" x="24" y="96">Context travels with the case inside</text>
      <text class="step-text" x="24" y="119">the existing review workspace.</text>
      <text class="step-text" x="24" y="142">Senior review remains human-led.</text>
    </g>

    <!-- Step 5 -->
    <g transform="translate(934 596)">
      <rect class="step" x="0" y="0" width="330" height="164"/>
      <circle class="circle" cx="34" cy="34" r="20"/>
      <text class="num" x="34" y="41" text-anchor="middle">5</text>
      <text class="step-title" x="66" y="32">Non-blame</text>
      <text class="step-title" x="66" y="59">Decision Receipt</text>
      <text class="step-text" x="24" y="96">Final recall decision and arbitration</text>
      <text class="step-text" x="24" y="119">rationale are preserved without</text>
      <text class="step-text" x="24" y="142">blaming one person.</text>
    </g>

    <!-- Step 6 -->
    <g transform="translate(500 596)">
      <rect class="step-blue" x="0" y="0" width="330" height="164"/>
      <circle class="circle" cx="34" cy="34" r="20"/>
      <text class="num" x="34" y="41" text-anchor="middle">6</text>
      <text class="step-title" x="66" y="32">Learning Memory +</text>
      <text class="step-title" x="66" y="59">Calibration</text>
      <text class="step-text" x="24" y="96">Difficult cases become learning</text>
      <text class="step-text" x="24" y="119">memory, workshop material and</text>
      <text class="step-text" x="24" y="142">future calibration.</text>
    </g>

    <!-- prototype markers -->
    <g transform="translate(1038 208)">
      <rect class="marker" x="0" y="0" width="190" height="56"/>
      <text class="marker-title" x="20" y="23">Prototype 1</text>
      <text class="marker-text" x="20" y="44">Detection Cue</text>
    </g>

    <g transform="translate(1338 472)">
      <rect class="marker" x="0" y="0" width="214" height="56"/>
      <text class="marker-title" x="20" y="23">Prototype 2</text>
      <text class="marker-text" x="20" y="44">Support Layer</text>
    </g>

    <g transform="translate(814 516)">
      <rect class="marker" x="0" y="0" width="246" height="56"/>
      <text class="marker-title" x="20" y="23">Prototype 3</text>
      <text class="marker-text" x="20" y="44">Receipt &amp; Learning Memory</text>
    </g>

    <!-- loop arrow label -->
    <g transform="translate(30 708)">
      <rect class="marker" x="0" y="0" width="430" height="42"/>
      <text class="marker-title" x="215" y="27" text-anchor="middle">Updated practice improves future judgement and escalation</text>
    </g>
  </g>

  <!-- Optional side note -->
  <g transform="translate(1362 214)">
    <rect class="panel" x="0" y="0" width="462" height="96"/>
    <text class="label" x="24" y="32">SERVICE SYSTEM NOTE</text>
    <text class="side-note" x="24" y="62">The loop connects screen-based review with soft</text>
    <text class="side-note" x="24" y="84">service artefacts, backstage records and team rituals.</text>
  </g>

  <g transform="translate(364 1000)">
    <rect class="panel" x="0" y="0" width="1192" height="58"/>
    <text class="statement" x="596" y="37" text-anchor="middle">Arbitration is not the end of the service. It is the gateway into learning.</text>
  </g>
</svg>
