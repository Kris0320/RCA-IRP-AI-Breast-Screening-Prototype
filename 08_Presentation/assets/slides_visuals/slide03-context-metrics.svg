<text x="120" y="780" font-family="IBM Plex Sans, Arial, sans-serif" font-size="29" font-weight="600" fill="#111827" text-anchor="start">When AI enters this pathway, it does not only support detection. It changes how responsibility, disagreement and review are handled.</text>
