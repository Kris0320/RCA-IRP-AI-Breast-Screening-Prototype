<text x="154" y="530" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#5E6B7A" text-anchor="start">High-volume public health</text>
<text x="154" y="560" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#5E6B7A" text-anchor="start">pathway</text>
