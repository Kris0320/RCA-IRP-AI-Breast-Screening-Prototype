<text x="584" y="462" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#111827" text-anchor="start">radiologist workforce pressure</text>
<text x="584" y="530" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#5E6B7A" text-anchor="start">More cases, limited expert</text>
<text x="584" y="560" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#5E6B7A" text-anchor="start">capacity</text>
<rect x="980" y="320" width="380" height="360" rx="18" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2"/>
<text x="1014" y="405" font-family="IBM Plex Sans, Arial, sans-serif" font-size="42" font-weight="800" fill="#2368A2" text-anchor="start">[PLACEHOLDER]</text>
<text x="1014" y="462" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#111827" text-anchor="start">screening demand / backlog</text>
