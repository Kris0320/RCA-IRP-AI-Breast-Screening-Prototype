<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#EFF0F2"/>
<text x="160" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3" style="">CONTEXT</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#C4C8D2" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="end" style="">3 / 25</text>
<text x="160" y="178" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start" style="">Two million scans. Not enough readers.</text>
<text x="160" y="246" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start" style="">AI stepped in.</text>
<text x="160" y="278" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#9CA3AF" text-anchor="start" style="font-style:italic">Nouis SC et al. BMC Med Ethics. 2025;26(1):89. doi: 10.1186/s12910-025-01243-z</text>
<text x="160" y="436" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" fill="#124BCE" text-anchor="start" style="">2M</text>
<text x="160" y="474" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#111827" text-anchor="start" style="">Mammograms Annually</text>
<text x="160" y="500" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">Increasing with the UK ageing population.</text>
<text x="575" y="436" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" fill="#124BCE" text-anchor="start" style="">29%</text>
<text x="575" y="474" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#111827" text-anchor="start" style="">Shortage of Radiologists</text>
<text x="575" y="500" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">Growing workforce gap placing pressure</text>
<text x="575" y="522" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">on existing radiologists.</text>
<text x="990" y="436" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" fill="#124BCE" text-anchor="start" style="">100%</text>
<text x="990" y="474" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#111827" text-anchor="start" style="">Departments Over Capacity</text>
<text x="990" y="500" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">Unable to meet demand within</text>
<text x="990" y="522" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">working hours.</text>
<text x="1405" y="436" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" fill="#124BCE" text-anchor="start" style="">40%</text>
<text x="1405" y="474" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#111827" text-anchor="start" style="">Workload Reduction</text>
<text x="1405" y="500" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">AI moving from experimental validation</text>
<text x="1405" y="522" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" style="">to real-world clinical deployment.</text>
<text x="160" y="660" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start" style="">This is the system Readyology was designed for — overstretched, under-governed, and now augmented by AI.</text>
<text x="160" y="716" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#124BCE" text-anchor="start" style="">At this scale, a missing protocol is a systemic risk.</text>
<text x="1760" y="1044" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="end" style="">Nouis SC, Uren V, Jariwala S. BMC Med Ethics. 2025;26(1):89. doi: 10.1186/s12910-025-01243-z</text>
</svg>
