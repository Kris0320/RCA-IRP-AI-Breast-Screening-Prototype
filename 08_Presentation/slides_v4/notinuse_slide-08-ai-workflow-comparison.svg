<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#EFF0F2"/>
<text x="160" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3">RESEARCH</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#C4C8D2" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="end">8 / 25</text>
<text x="160" y="158" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start">Four AI deployment patterns</text>
<text x="160" y="236" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start">in breast screening.</text>
<text x="160" y="276" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start">Literature maps four ways AI is placed in the screening workflow. In each, disagreement between AI and human</text>
<text x="160" y="302" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start">judgement appears — at a different moment, with no structured response.</text>
<line x1="160" y1="308" x2="1760" y2="308" stroke="#C4C8D2" stroke-width="1"/>
<rect x="160" y="330" width="385" height="570" fill="#EAECF2" rx="6" stroke="#C4C8D2" stroke-width="1"/>
<circle cx="190" cy="366" r="18" fill="#6B7280"/>
<text x="190" y="372" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
<text x="180" y="420" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start">AI before reading</text>
<rect x="180" y="450" width="82" height="38" fill="#E8693C" rx="4"/>
<rect x="267" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="354" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="441" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<line x1="180" y1="506" x2="525" y2="506" stroke="#C4C8D2" stroke-width="1"/>
<text x="180" y="534" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">AI output precedes independent</text>
<text x="180" y="558" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">human judgement. Divergence</text>
<text x="180" y="582" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">is absorbed, not recorded.</text>
<rect x="565" y="330" width="385" height="570" fill="#EAECF2" rx="6" stroke="#C4C8D2" stroke-width="1"/>
<circle cx="595" cy="366" r="18" fill="#6B7280"/>
<text x="595" y="372" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
<text x="585" y="410" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start">AI as post-read</text>
<text x="585" y="436" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start">second reader</text>
<rect x="585" y="462" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="672" y="462" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="759" y="462" width="82" height="38" fill="#E8693C" rx="4"/>
<rect x="846" y="462" width="82" height="38" fill="#D0D4DE" rx="4"/>
<line x1="585" y1="518" x2="930" y2="518" stroke="#C4C8D2" stroke-width="1"/>
<text x="585" y="546" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">Human reads first, then AI compares.</text>
<text x="585" y="570" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">Divergence is visible but there is no</text>
<text x="585" y="594" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">shared protocol for review, rationale,</text>
<text x="585" y="618" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">or escalation.</text>
<rect x="970" y="330" width="385" height="570" fill="#EAECF2" rx="6" stroke="#C4C8D2" stroke-width="1"/>
<circle cx="1000" cy="366" r="18" fill="#6B7280"/>
<text x="1000" y="372" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
<text x="990" y="420" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start">AI as safety net</text>
<rect x="990" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="1077" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="1164" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="1251" y="450" width="82" height="38" fill="#E8693C" rx="4"/>
<line x1="990" y1="506" x2="1335" y2="506" stroke="#C4C8D2" stroke-width="1"/>
<text x="990" y="534" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">AI may reopen cases already considered</text>
<text x="990" y="558" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">clear — creating uncertainty around</text>
<text x="990" y="582" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">when to trigger a second look.</text>
<rect x="1375" y="330" width="385" height="570" fill="#EAECF2" rx="6" stroke="#C4C8D2" stroke-width="1"/>
<circle cx="1405" cy="366" r="18" fill="#6B7280"/>
<text x="1405" y="372" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
<text x="1395" y="420" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start">AI as triage</text>
<rect x="1395" y="450" width="82" height="38" fill="#E8693C" rx="4"/>
<rect x="1482" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="1569" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<rect x="1656" y="450" width="82" height="38" fill="#D0D4DE" rx="4"/>
<line x1="1395" y1="506" x2="1740" y2="506" stroke="#C4C8D2" stroke-width="1"/>
<text x="1395" y="534" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">AI changes case routing, creating</text>
<text x="1395" y="558" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">boundary decisions and exceptions</text>
<text x="1395" y="582" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#6B7280" text-anchor="start">that need fallback processes.</text>
<rect x="160" y="911" width="20" height="16" fill="#E8693C" rx="3"/>
<text x="188" y="924" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280">AI reads</text>
<rect x="270" y="911" width="20" height="16" fill="#D0D4DE" rx="3"/>
<text x="298" y="924" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280">Human reads</text>
<line x1="160" y1="960" x2="1760" y2="960" stroke="#C4C8D2" stroke-width="1"/>
<text x="160" y="996" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start">Across all four models, when AI and human judgement diverge, there is no shared protocol for review, rationale, or learning.</text>
<text x="160" y="1042" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#124BCE" text-anchor="start">Readyology addresses this gap regardless of which deployment model is in use.</text>
</svg>