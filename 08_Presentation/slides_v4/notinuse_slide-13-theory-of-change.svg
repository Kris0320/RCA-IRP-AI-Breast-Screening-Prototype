<text x="466" y="930" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#111827" text-anchor="start" style="">Expert test — Sophia Zackrisson: 'Keep it simple. No extra steps.'</text>
