<text x="1146" y="930" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#111827" text-anchor="start" style="">Usability test — medical student: 'Real scenarios are fast. Design must be direct.'</text>
