<text x="1380" y="706" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="400" fill="#6B7280">too late to change the patient's outcome.</text>

<!-- BODY + TAKEAWAY -->
<text x="160" y="870" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#6B7280">Analytical frame only — not a proposed NHS workflow. Disagreement at Steps 4–5 directly determines recall or no recall. This is where a structured response matters most.</text>
<text x="160" y="920" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" fill="#124BCE">Pattern 3 makes disagreement visible before the final decision — where a structured service response can still support review, arbitration and learning.</text>

