<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#EFF0F2"/>

<!-- Header -->
<text x="160" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3">CONTEXT</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#C4C8D2" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="end">3 / 29</text>

<!-- Title -->
<text x="160" y="158" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start">What is breast cancer screening?</text>
<line x1="160" y1="178" x2="240" y2="178" stroke="#124BCE" stroke-width="2"/>

<!-- Left: video placeholder 16:9 — 1000 x 562 -->
<rect x="160" y="210" width="1000" height="562" fill="#D0D4DE" rx="4"/>
<text x="660" y="499" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#9AAABF" text-anchor="middle">[ VIDEO / PHOTO: NHS breast screening — what to expect ]</text>
<text x="660" y="756" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#9AAABF" text-anchor="middle">Source: NHS official video · used for educational reference</text>

<!-- Below video: key stat -->
<line x1="160" y1="792" x2="1160" y2="792" stroke="#C4C8D2" stroke-width="1"/>
<text x="160" y="878" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="#124BCE" text-anchor="start">55,000</text>
<text x="160" y="928" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">new breast cancer cases in the UK each year.</text>
<text x="160" y="966" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="start">Breast cancer is the most common cancer in UK women.</text>

<!-- Vertical divider -->
<line x1="1180" y1="210" x2="1180" y2="1044" stroke="#C4C8D2" stroke-width="1"/>

<!-- ITEM 01 — The NHS -->
<text x="1220" y="240" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8693C" letter-spacing="2">01</text>
<line x1="1220" y1="256" x2="1740" y2="256" stroke="#C4C8D2" stroke-width="1"/>
<text x="1220" y="296" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">What is the NHS?</text>
<text x="1220" y="328" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">National Health Service — free healthcare for all UK residents.</text>
<text x="1220" y="350" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">Breast screening is a standardised national programme, fully NHS-funded.</text>
<line x1="1220" y1="418" x2="1740" y2="418" stroke="#C4C8D2" stroke-width="1"/>

<!-- ITEM 02 — The radiologist -->
<text x="1220" y="448" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8693C" letter-spacing="2">02</text>
<line x1="1220" y1="464" x2="1740" y2="464" stroke="#C4C8D2" stroke-width="1"/>
<text x="1220" y="504" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">The radiologist's daily reality</text>
<text x="1220" y="536" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">One radiologist reads 80+ mammograms per day.</text>
<text x="1220" y="558" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">~2 million scans per year. Each read is a life-critical decision.</text>
<line x1="1220" y1="626" x2="1740" y2="626" stroke="#C4C8D2" stroke-width="1"/>

<!-- ITEM 03 — Double-reading standard -->
<text x="1220" y="656" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8693C" letter-spacing="2">03</text>
<line x1="1220" y1="672" x2="1740" y2="672" stroke="#C4C8D2" stroke-width="1"/>
<text x="1220" y="712" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Every mammogram is read twice</text>
<text x="1220" y="744" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">Two radiologists read each scan independently — NHS standard.</text>
<text x="1220" y="766" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">AI is now entering as an additional reader in NHS pilots.</text>
<line x1="1220" y1="834" x2="1740" y2="834" stroke="#C4C8D2" stroke-width="1"/>

<!-- ITEM 04 — Stakes -->
<text x="1220" y="864" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8693C" letter-spacing="2">04</text>
<line x1="1220" y1="880" x2="1740" y2="880" stroke="#C4C8D2" stroke-width="1"/>
<text x="1220" y="920" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Early detection saves lives</text>
<text x="1220" y="952" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">Find it early: most women survive.</text>
<text x="1220" y="974" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280">Find it late: most women don't. That is why every read matters.</text>

<text x="1760" y="1052" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="end" font-style="italic">Cancer Research UK, Breast Cancer Statistics 2022  ·  NHS England Digital, Breast Screening Programme 2023–24  ·  digital.nhs.uk</text>
</svg>