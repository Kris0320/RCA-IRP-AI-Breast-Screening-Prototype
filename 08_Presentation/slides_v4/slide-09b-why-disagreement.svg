<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#EFF0F2"/>

<!-- HEADER -->
<text x="160" y="60" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#124BCE" letter-spacing="3">RESEARCH</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#C4C8D2" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="end">10 / 30</text>

<!-- H1 + SUBTITLE -->
<text x="160" y="148" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="700" fill="#111827">Every source pointed to the same gap.</text>
<text x="160" y="190" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280">Across expert consultations, radiologist interviews and AI workflow analysis — the same moment kept appearing.</text>

<!-- ── 3 EVIDENCE CARDS ── -->
<!-- Cards: w=500, gap=50; x: 160, 710, 1260 -->

<!-- Card 1: Expert Consultations -->
<rect x="160" y="234" width="500" height="480" fill="#FFFFFF" rx="8"/>
<rect x="160" y="234" width="6" height="480" fill="#124BCE" rx="3"/>
<text x="186" y="282" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#124BCE" letter-spacing="2">EXPERT CONSULTATIONS</text>
<text x="186" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="#111827">3</text>
<text x="226" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#6B7280"> clinicians consulted</text>
<line x1="186" y1="346" x2="636" y2="346" stroke="#C4C8D2" stroke-width="1"/>
<text x="186" y="386" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">"There is no agreed protocol for what</text>
<text x="186" y="410" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">happens when AI and a radiologist</text>
<text x="186" y="434" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">reach different conclusions."</text>
<line x1="186" y1="462" x2="636" y2="462" stroke="#C4C8D2" stroke-width="1"/>
<text x="186" y="494" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#9CA3AF">Hutan Ashrafian · Imperial College London</text>
<text x="186" y="516" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#9CA3AF">Deborah Cunningham · IC Healthcare NHS</text>
<text x="186" y="538" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#9CA3AF">Sophia Zackrisson · Lund University</text>
<text x="186" y="578" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">→ Disagreement handling not standardised</text>
<text x="186" y="600" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">   anywhere in current NHS workflow</text>

<!-- Card 2: Public Interviews -->
<rect x="710" y="234" width="500" height="480" fill="#FFFFFF" rx="8"/>
<rect x="710" y="234" width="6" height="480" fill="#124BCE" rx="3"/>
<text x="736" y="282" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#124BCE" letter-spacing="2">RADIOLOGIST INTERVIEWS</text>
<text x="736" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="#111827">20+</text>
<text x="822" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#6B7280"> participants</text>
<line x1="736" y1="346" x2="1186" y2="346" stroke="#C4C8D2" stroke-width="1"/>
<text x="736" y="386" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">"When the AI score is different from</text>
<text x="736" y="410" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">mine, I don't always know</text>
<text x="736" y="434" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280" font-style="italic">what I'm supposed to do next."</text>
<line x1="736" y1="462" x2="1186" y2="462" stroke="#C4C8D2" stroke-width="1"/>
<text x="736" y="494" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#9CA3AF">Radiologist trainee, NHS Breast Screening</text>
<text x="736" y="516" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#9CA3AF">Public interview cohort, 2025</text>
<text x="736" y="578" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">→ No guidance on how to act when</text>
<text x="736" y="600" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">   AI output conflicts with own reading</text>

<!-- Card 3: Workflow Analysis -->
<rect x="1260" y="234" width="500" height="480" fill="#FFFFFF" rx="8"/>
<rect x="1260" y="234" width="6" height="480" fill="#124BCE" rx="3"/>
<text x="1286" y="282" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#124BCE" letter-spacing="2">AI WORKFLOW ANALYSIS</text>
<text x="1286" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="#111827">9</text>
<text x="1316" y="322" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#6B7280"> workflow models analysed</text>
<line x1="1286" y1="346" x2="1736" y2="346" stroke="#C4C8D2" stroke-width="1"/>
<text x="1286" y="386" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280">Models from UK, USA, Sweden,</text>
<text x="1286" y="410" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280">Netherlands and Australia.</text>
<text x="1286" y="450" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280">Each places AI differently</text>
<text x="1286" y="474" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="#6B7280">in the screening pathway.</text>
<line x1="1286" y1="510" x2="1736" y2="510" stroke="#C4C8D2" stroke-width="1"/>
<text x="1286" y="578" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">→ None include a structured step</text>
<text x="1286" y="600" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#E8693C">   for handling AI–radiologist disagreement</text>

<!-- TAKEAWAY -->
<text x="160" y="786" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" fill="#124BCE">The disagreement moment exists in every model — and is addressed in none.</text>
<text x="160" y="830" font-family="Montserrat,'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#6B7280">So we mapped where it appears — across all four AI placement patterns.</text>

</svg>
