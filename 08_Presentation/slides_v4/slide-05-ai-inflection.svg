<text x="720" y="552" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="start" >175,000-woman NHS study — largest to date.</text>
<text x="720" y="572" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="start" >AI matched or exceeded radiologist performance.</text>
