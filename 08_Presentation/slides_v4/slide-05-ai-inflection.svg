<text x="160" y="186" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#6B7280" text-anchor="start" >Active NHS pilots in the UK. Live service in Germany. No approved clinical AI service in the UK yet.</text>

