<line x1="1280" y1="498" x2="1760" y2="498" stroke="#C4C8D2" stroke-width="1"/>
<text x="1280" y="526" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start" >Vara · Germany National Screening Programme</text>
<text x="1280" y="552" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="start" >Only CE-marked AI for independent second read.</text>
<text x="1280" y="572" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="start" >40% of Germany's national programme. 1.5M</text>
<text x="1280" y="592" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="start" >mammograms annually. 80,000+ women/month.</text>
<text x="1280" y="634" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6B7280" text-anchor="start" font-style="italic">³ Vara / PRAIM Study (500,000 participants), 2025</text>

<text x="160" y="758" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start" >AI is already reading mammograms — in NHS pilots, in trials, and as a live national service in Germany.</text>

<text x="160" y="800" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#124BCE" text-anchor="start" >But when AI and the radiologist see different things, every hospital handles it differently.</text>

