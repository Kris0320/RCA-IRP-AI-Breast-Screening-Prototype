<text x="720" y="634" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6B7280" text-anchor="start" font-style="italic">² Imperial College London / Google Health, Nature Cancer, Mar 2026</text>
