<text x="160" y="634" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6B7280" text-anchor="start" font-style="italic">¹ NHS Grampian / Kheiron / Microsoft, 2024</text>
