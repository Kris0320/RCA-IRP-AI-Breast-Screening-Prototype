<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#0A1628"/>
<text x="160" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#7B8DA0" text-anchor="start" letter-spacing="3" style="">CONTEXT</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#1A2E48" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#7B8DA0" text-anchor="end" style="">6 / 29</text>
<text x="160" y="230" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#4A6A8A" text-anchor="start" letter-spacing="1">Sarah, 28  ·  Radiology Trainee  ·  NHS Breast Screening Unit</text>
<text x="160" y="316" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#7B8DA0" text-anchor="start">She reviews 80 mammograms a day — and coordinates with the MDT team between reads.</text>
<text x="160" y="376" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#7B8DA0" text-anchor="start">Each one is a life-critical decision.</text>
<line x1="160" y1="424" x2="232" y2="424" stroke="#124BCE" stroke-width="3"/>
<text x="160" y="536" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" text-anchor="start" style="">The AI reader gives a different result.</text>
<text x="160" y="660" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" text-anchor="start" style="">There is no protocol for this moment.</text>
<text x="160" y="1036" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#243650" text-anchor="start" style="">[ PHOTO: radiologist reading mammogram — high-contrast clinical scene ]</text>
</svg>
