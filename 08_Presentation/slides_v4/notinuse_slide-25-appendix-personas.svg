<text x="432" y="412" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280" text-anchor="start">Primary reader in NHS breast screening. Reads</text>
<text x="432" y="434" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280" text-anchor="start">mammograms independently before AI output is revealed.</text>
