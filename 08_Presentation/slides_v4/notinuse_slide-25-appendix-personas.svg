<text x="1244" y="835" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#6B7280" text-anchor="start" letter-spacing="1">ROLE TYPE</text>
<text x="1244" y="855" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="start">Arbitration Lead</text>
