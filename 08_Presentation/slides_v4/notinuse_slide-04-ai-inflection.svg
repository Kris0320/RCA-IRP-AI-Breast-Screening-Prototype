<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#EFF0F2"/>
<text x="160" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3">CONTEXT</text>
<line x1="160" y1="74" x2="1760" y2="74" stroke="#C4C8D2" stroke-width="1"/>
<text x="1760" y="60" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="end">4 / 25</text>
<text x="160" y="172" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#111827" text-anchor="start">AI Is Entering the Reading Room.</text>
<text x="160" y="232" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="start">The technology is here. The system is not ready.</text>
<text x="160" y="308" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#124BCE" text-anchor="start">The Promise</text>
<circle cx="166" cy="362" r="4" fill="#124BCE"/>
<text x="180" y="368" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Detect cancers human readers might miss</text>
<circle cx="166" cy="408" r="4" fill="#124BCE"/>
<text x="180" y="414" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Reduce double-reading workload by 50%</text>
<circle cx="166" cy="454" r="4" fill="#124BCE"/>
<text x="180" y="460" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Improve recall accuracy, reduce false positives</text>
<circle cx="166" cy="500" r="4" fill="#124BCE"/>
<text x="180" y="506" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Support radiologists in high-volume sessions</text>
<circle cx="166" cy="546" r="4" fill="#124BCE"/>
<text x="180" y="552" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Consistent AI baseline across all cases</text>
<text x="1350" y="308" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#6B7280" text-anchor="start">The Reality</text>
<circle cx="1356" cy="362" r="4" fill="#C84B00"/>
<text x="1370" y="368" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">AI introduced without an accountability framework</text>
<circle cx="1356" cy="408" r="4" fill="#C84B00"/>
<text x="1370" y="414" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Clinical governance not updated for co-reading</text>
<circle cx="1356" cy="454" r="4" fill="#C84B00"/>
<text x="1370" y="460" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">No standard protocol for AI-human conflicts</text>
<circle cx="1356" cy="500" r="4" fill="#C84B00"/>
<text x="1370" y="506" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Responsibility in disagreement remains undefined</text>
<circle cx="1356" cy="546" r="4" fill="#C84B00"/>
<text x="1370" y="552" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#111827" text-anchor="start">Workflow designed for human-only reading</text>
<line x1="630" y1="860" x2="1290" y2="860" stroke="#C4C8D2" stroke-width="1"/>
<line x1="630" y1="860" x2="630" y2="866" stroke="#C4C8D2" stroke-width="1"/>
