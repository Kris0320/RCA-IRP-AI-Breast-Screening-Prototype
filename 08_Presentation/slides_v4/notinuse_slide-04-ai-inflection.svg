<path d="M 630,852 C 730,850 840,847 940,844 C 1040,840 1160,836 1290,832" fill="none" opacity="1" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 630,852 C 700,848 750,820 830,765 C 910,710 970,630 1050,550 C 1130,470 1210,400 1290,355" fill="none" opacity="1" stroke="#124BCE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
