<line x1="795" y1="860" x2="795" y2="866" stroke="#C4C8D2" stroke-width="1"/>
<text x="795" y="882" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="middle">2020</text>
<line x1="960" y1="860" x2="960" y2="866" stroke="#C4C8D2" stroke-width="1"/>
<text x="960" y="882" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="middle">2022</text>
<line x1="1125" y1="860" x2="1125" y2="866" stroke="#C4C8D2" stroke-width="1"/>
<text x="1125" y="882" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="middle">2023</text>
<line x1="1290" y1="860" x2="1290" y2="866" stroke="#C4C8D2" stroke-width="1"/>
<text x="1290" y="882" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" text-anchor="middle">Now →</text>
