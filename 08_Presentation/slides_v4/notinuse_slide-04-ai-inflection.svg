<text x="682" y="327" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#124BCE" text-anchor="start">AI Technical Capability</text>
<line x1="645" y1="350" x2="672" y2="350" stroke="#6B7280" stroke-width="2.5"/>
<circle cx="672" cy="350" r="4" fill="#6B7280"/>
<text x="682" y="355" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280" text-anchor="start">Clinical Governance Readiness</text>
