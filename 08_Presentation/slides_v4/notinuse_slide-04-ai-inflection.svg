<circle cx="1290" cy="832" r="5" fill="#6B7280"/>




<line x1="955" y1="565" x2="955" y2="840" stroke="#E8693C" stroke-width="1"/>
<line x1="949" y1="565" x2="961" y2="565" stroke="#E8693C" stroke-width="1"/>
<line x1="949" y1="840" x2="961" y2="840" stroke="#E8693C" stroke-width="1"/>
<rect x="889" y="675" width="132" height="40" fill="#FFFFFF" rx="4" stroke="#E8693C" stroke-width="1.5"/>
<text x="955" y="701" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#E8693C" text-anchor="middle" letter-spacing="2">THE GAP</text>
<text x="955" y="725" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#E8693C" text-anchor="middle">Disagreement Zone</text>
<text x="960" y="902" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="middle" style="font-style:italic">Conceptual illustration of governance lag · supported by literature below</text>
<text x="160" y="952" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start">AI can detect. AI can assist. But AI cannot manage trust, accountability, or the human dynamics of disagreement.</text>
<text x="160" y="1004" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#124BCE" text-anchor="start">Disagreement is a people problem. That is where service design begins.</text>
<text x="1760" y="1055" font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" text-anchor="end" style="font-style:italic">Topol EJ. Nat Med. 2019;25:44–56  ·  Morley J et al. Soc Sci Med. 2020;260:113172  ·  Nouis SC et al. BMC Med Ethics. 2025;26(1):89</text>
<rect x="635" y="300" width="256" height="64" fill="white" rx="6" stroke="#C4C8D2" stroke-width="1"/>
<line x1="645" y1="322" x2="672" y2="322" stroke="#124BCE" stroke-width="2.5"/>
