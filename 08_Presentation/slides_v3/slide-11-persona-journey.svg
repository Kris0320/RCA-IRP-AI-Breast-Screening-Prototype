<text x="1026" y="792" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="20" font-weight="400" fill="#6B7280" text-anchor="start" style="">Scores differ. No escalation protocol. Ad hoc decision.</text>
