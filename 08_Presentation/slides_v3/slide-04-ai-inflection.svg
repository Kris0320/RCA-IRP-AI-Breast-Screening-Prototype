<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#FFFFFF"/>
<line x1="120" y1="58" x2="1800" y2="58" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3" style="">READYOLOGY  ·  IRP 2025–26</text>
<text x="1800" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="end" style="">4 / 21</text>
<text x="120" y="168" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="76" font-weight="700" fill="#0D1117" text-anchor="start" style="">AI Is Entering the Reading Room.</text>
<text x="120" y="240" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#6B7280" text-anchor="start" style="">The technology is here. The system isn't ready.</text>
<text x="120" y="348" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="36" font-weight="700" fill="#124BCE" text-anchor="start" style="">The Promise</text>
<line x1="120" y1="372" x2="920" y2="372" stroke="#124BCE" stroke-width="1.5"/>
<circle cx="126" cy="400" r="4" fill="#124BCE"/>
<text x="148" y="408" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Detect cancers human readers might miss</text>
<circle cx="126" cy="452" r="4" fill="#124BCE"/>
<text x="148" y="460" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Reduce double-reading workload by up to 50%</text>
<circle cx="126" cy="504" r="4" fill="#124BCE"/>
<text x="148" y="512" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Improve recall accuracy, reduce false positives</text>
<circle cx="126" cy="556" r="4" fill="#124BCE"/>
<text x="148" y="564" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Support radiologists in high-volume sessions</text>
<circle cx="126" cy="608" r="4" fill="#124BCE"/>
<text x="148" y="616" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Consistent AI baseline across all cases</text>
<text x="1000" y="348" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="36" font-weight="700" fill="#6B7280" text-anchor="start" style="">The Reality</text>
<line x1="1000" y1="372" x2="1800" y2="372" stroke="#E5E7EB" stroke-width="1.5"/>
<circle cx="1006" cy="400" r="4" fill="#6B7280"/>
<text x="1028" y="408" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">No protocol for handling AI-human disagreement</text>
<circle cx="1006" cy="452" r="4" fill="#6B7280"/>
<text x="1028" y="460" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">Override decisions inconsistently recorded</text>
<circle cx="1006" cy="504" r="4" fill="#6B7280"/>
<text x="1028" y="512" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">No feedback loop: AI output vs clinical outcomes</text>
<circle cx="1006" cy="556" r="4" fill="#6B7280"/>
<text x="1028" y="564" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">No structured handover when cases need review</text>
<circle cx="1006" cy="608" r="4" fill="#6B7280"/>
<text x="1028" y="616" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#0D1117" text-anchor="start" style="">No institutional learning from difficult cases</text>
<line x1="120" y1="696" x2="1800" y2="696" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="746" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="28" font-weight="600" fill="#124BCE" text-anchor="start" style="">Readyology fills the gap on the right.</text>
</svg>
