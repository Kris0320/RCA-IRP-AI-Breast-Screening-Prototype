<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#FFFFFF"/>
<line x1="120" y1="58" x2="1800" y2="58" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3" style="">READYOLOGY  ·  IRP 2025–26</text>
<text x="1800" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="end" style="">12 / 21</text>
<text x="120" y="240" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="80" font-weight="300" fill="#6B7280" text-anchor="start" style="">The gap is not detection.</text>
<text x="120" y="352" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="80" font-weight="700" fill="#0D1117" text-anchor="start" style="">It is what happens next.</text>
<line x1="120" y1="400" x2="600" y2="400" stroke="#124BCE" stroke-width="3"/>
<text x="120" y="484" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="32" font-weight="400" fill="#0D1117" text-anchor="start" style="">How might we help breast cancer screening radiologists detect,</text>
<text x="120" y="530" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="32" font-weight="400" fill="#0D1117" text-anchor="start" style="">resolve and learn from AI-human disagreements -- in a way that is</text>
<text x="120" y="576" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="32" font-weight="700" fill="#124BCE" text-anchor="start" style="">accountable, transparent and consistent?</text>
<text x="120" y="1008" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="18" font-weight="600" fill="#6B7280" text-anchor="start" letter-spacing="2" style="">Accountable  ·  Transparent  ·  Consistent</text>
</svg>
