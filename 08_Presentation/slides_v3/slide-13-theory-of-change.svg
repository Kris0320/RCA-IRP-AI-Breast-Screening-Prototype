<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#FFFFFF"/>
<line x1="120" y1="58" x2="1800" y2="58" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3" style="">READYOLOGY  ·  IRP 2025–26</text>
<text x="1800" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="end" style="">13 / 21</text>
<text x="120" y="168" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="76" font-weight="700" fill="#0D1117" text-anchor="start" style="">Theory of Change</text>
<text x="120" y="240" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#6B7280" text-anchor="start" style="">Our design hypothesis -- and how we validated it.</text>
<text x="120" y="348" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="56" font-weight="700" fill="#124BCE" text-anchor="start" style="">IF</text>
<line x1="120" y1="372" x2="626" y2="372" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="424" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">Breast cancer screening teams have a</text>
<text x="120" y="460" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">lightweight service layer that</text>
<text x="120" y="496" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">surfaces AI-human disagreement with</text>
<text x="120" y="532" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">soft cues, structured review, and a</text>
<text x="120" y="568" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">traceable decision record --</text>
<text x="706" y="348" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="56" font-weight="700" fill="#6B7280" text-anchor="start" style="">THEN</text>
<line x1="706" y1="372" x2="1212" y2="372" stroke="#E5E7EB" stroke-width="1"/>
<text x="706" y="424" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">Radiologists can detect, resolve and</text>
<text x="706" y="460" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">learn from AI-human disagreement in a</text>
<text x="706" y="496" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">way that is accountable, transparent</text>
<text x="706" y="532" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">and consistent, without adding</text>
<text x="706" y="568" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">cognitive burden to an already time-</text>
<text x="706" y="604" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">pressured workflow.</text>
<text x="1292" y="348" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="56" font-weight="700" fill="#16A34A" text-anchor="start" style="">SO THAT</text>
<line x1="1292" y1="372" x2="1798" y2="372" stroke="#E5E7EB" stroke-width="1"/>
<text x="1292" y="424" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">Disagreement becomes an institutional</text>
<text x="1292" y="460" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">learning resource, AI calibration</text>
<text x="1292" y="496" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">improves over time, and women receive</text>
<text x="1292" y="532" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">safer, more consistent recall</text>
<text x="1292" y="568" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#0D1117" text-anchor="start" style="">decisions.</text>
<line x1="120" y1="870" x2="1800" y2="870" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="920" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="22" font-weight="600" fill="#6B7280" text-anchor="start" style="">Validated:</text>
<circle cx="446" cy="912" r="4" fill="#124BCE"/>
<text x="466" y="920" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="20" font-weight="400" fill="#0D1117" text-anchor="start" style="">Expert test -- Sophia Zackrisson: 'Keep it simple. No extra steps.'</text>
<circle cx="1206" cy="912" r="4" fill="#124BCE"/>
<text x="1226" y="920" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="20" font-weight="400" fill="#0D1117" text-anchor="start" style="">Usability test -- medical student: 'Real scenarios are fast. Design must be direct.'</text>
