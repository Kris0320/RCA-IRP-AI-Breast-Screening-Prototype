<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,700&amp;display=swap');</style></defs>
<rect width="1920" height="1080" fill="#FFFFFF"/>
<line x1="120" y1="58" x2="1800" y2="58" stroke="#E5E7EB" stroke-width="1"/>
<text x="120" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="600" fill="#124BCE" text-anchor="start" letter-spacing="3" style="">READYOLOGY  ·  IRP 2025–26</text>
<text x="1800" y="46" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="14" font-weight="400" fill="#6B7280" text-anchor="end" style="">5 / 21</text>
<text x="120" y="200" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="52" font-weight="300" fill="#6B7280" text-anchor="start" style="">A radiologist reads a mammogram.</text>
<text x="120" y="316" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="80" font-weight="700" fill="#0D1117" text-anchor="start" style="">AI flags it as high risk.</text>
<text x="120" y="416" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="80" font-weight="700" fill="#0D1117" text-anchor="start" style="">She isn't convinced.</text>
<line x1="120" y1="460" x2="520" y2="460" stroke="#124BCE" stroke-width="3"/>
<text x="120" y="532" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="36" font-weight="400" fill="#6B7280" text-anchor="start" style="">The question is no longer: "Is the AI right?"</text>
<text x="120" y="600" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="36" font-weight="400" fill="#6B7280" text-anchor="start" style="">It is:</text>
<text x="120" y="660" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="36" font-weight="700" fill="#124BCE" text-anchor="start" style="">"What happens next -- when they disagree?"</text>
<text x="120" y="1008" font-family="Montserrat, Inter, Helvetica Neue, sans-serif" font-size="18" font-weight="400" fill="#9CA3AF" text-anchor="start" style="font-style:italic;">Breast Advanced Practitioner  ·  high-volume screening session  ·  mobile van  ·  next case.</text>
</svg>
